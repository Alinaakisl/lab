<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Home</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="game-board"></div>
    <div class="controls"></div>
    <p></p>
    <div class="joistick">
	<button onClick="direction='up'">UP</button>
	<button onClick="direction='down'">DOWN</button>
	<button onClick="direction='left'">LEFT</button>
	<button onClick="direction='right'">RIGHT</button>
    </div>
    <div>
	<label for="speed">Скорость</label>
	<input id="speed"  type="number" step="50"/>
    </div>
    <div>
	Счет: <span id="score-value"/>
    </div>
    <script src="script.js"></script>
  </body>
</html>
