<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Факты о числах — Лабораторная №5 (Vue)</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            padding: 32px;
            max-width: 550px;
            width: 100%;
            transition: 0.2s;
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 8px;
            color: #1e293b;
        }
        .sub {
            color: #475569;
            margin-bottom: 28px;
            border-left: 3px solid #8b5cf6;
            padding-left: 12px;
        }
        .field {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #0f172a;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            background: white;
            transition: 0.2s;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.2);
        }
        button {
            background: #1e293b;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button:hover:not(:disabled) {
            background: #0f172a;
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.6;
            cursor: wait;
        }
        .result {
            margin-top: 28px;
            background: #f8fafc;
            padding: 20px;
            border-radius: 24px;
            border-left: 5px solid #8b5cf6;
            font-size: 1.1rem;
            line-height: 1.4;
            min-height: 100px;
        }
        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-placeholder {
            color: #b91c1c;
            background: #fee2e2;
            border-left-color: #dc2626;
        }
        small {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="card">
            <h1>📚 Случайные факты о числах</h1>
            <div class="sub">Математика, история, забавные совпадения</div>

            <div class="field">
                <label>🔢 Число / Год</label>
                <input type="number" v-model="number" @keyup.enter="fetchFact" placeholder="42, 2024, 7...">
            </div>

            <div class="field">
                <label>📂 Категория</label>
                <select v-model="category">
                    <option value="trivia">🎲 Trivia (случайный факт)</option>
                    <option value="math">📐 Math (математический факт)</option>
                    <option value="year">📅


Year (исторический год)</option>
                </select>
            </div>

            <button @click="fetchFact" :disabled="loading">
                <span v-if="loading" class="loader"></span>
                <span v-else>🔍</span>
                {{ loading ? 'Загрузка...' : 'Поиск' }}
            </button>

            <div class="result" :class="{ 'error-placeholder': isError }">
                <div v-if="loading">⏳ Ищем интересный факт...</div>
                <div v-else>{{ resultText }}</div>
            </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const number = ref(42);          // стартовое значение
                const category = ref('trivia');  // по умолчанию trivia
                const loading = ref(false);
                const resultText = ref('✨ Здесь появится интересный факт...');
                const isError = ref(false);

                const fetchFact = async () => {
                    // Валидация
                    let num = number.value;
                    if (num === null || num === '' || isNaN(parseInt(num))) {
                        resultText.value = '❌ Введите корректное число (целое).';
                        isError.value = true;
                        return;
                    }

                    loading.value = true;
                    resultText.value = '⏳ Загружаем данные...';
                    isError.value = false;

                    try {
                        // Используем HTTPS для надёжности (API поддерживает)
                        const url = `https://numbersapi.com/${num}/${category.value}?json`;
                        const response = await fetch(url);
                        
                        if (!response.ok) throw new Error('Ошибка сети');

                        const data = await response.json();
                        
                        if (data.found === true) {
                            resultText.value = `📌 ${data.text}`;
                            isError.value = false;
                        } else {
                            // Факт не найден — выводим скучное число/скучный год
                            const typeName = category.value === 'year' ? 'скучный год' : 'скучное число';
                            resultText.value = `${num} - ${typeName}`;
                            isError.value = true;
                        }
                    } catch (err) {
                        console.error(err);
                        resultText.value = '⚠️ Ошибка соединения. Проверьте интернет.';
                        isError.value = true;
                    } finally {
                        loading.value = false;
                    }
                };

                return {
                    number,
                    category,
                    loading,
                    resultText,
                    isError,
                    fetchFact
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
